<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Generator</title>
    <style>
          body{
            background-color: rgb(224, 232, 240);
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            color: #415e75;
          }
          input{
            background-color: white;
            border-radius: 5px;
            border: none;
          }
          button{
            border: none;
            border-radius: 4px;
            background-color: #81a3be;
            width: 100px;
            height: 23px;
            margin: 5px;
          }
          button:hover{
            background-color: #4b6a85; 
            color: white;
          }
          h3{
             text-align: center;
          }
          section{
            display: flex;
            flex-direction: column;
            margin: 12px;
          }
    </style>
</head>
<body>
    <h3>Stwórz Swojego Bohatera!</h3>
    <section>
    <label for="name">podaj imie</label>
    <input type="text" name="name" id="name">

    <label for="rola">podaj rolę</label>
    <input type="text" name="rola" id="rola">
    
    <label for="przedmiot">podaj przedmiot/y</label>
    <input type="text" name="przedmiot" id="przedmiot">

    <label for="umetnosci">Umętności</label>
    <input type="text" name="umetnosci" id="umetnosci">

    <label for="leel">Level</label>
    <input type="number" name="leel" id="leel">
    </section>
    <button onclick="generateChar()">Zgeneruj</button>
    <section id="kaszka">
    </section>
    <script src="scrypt.js"></script>
</body>
</html>
